<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ذكاء طلائع العروبة</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --accent: #c9a227;
    --accent2: #e6b800;
    --text: #e6edf3;
    --text2: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  #header .logo {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--accent), #8b6914);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: bold; color: #fff;
    flex-shrink: 0;
  }
  #header h1 { font-size: 18px; color: var(--accent2); font-weight: 700; line-height: 1.2; }
  #header p { font-size: 12px; color: var(--text2); }
  #header .status { margin-right: auto; display:flex; align-items:center; gap:6px; font-size:13px; color:var(--green); }
  #header .status::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block; }
  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #chat-container::-webkit-scrollbar { width: 6px; }
  #chat-container::-webkit-scrollbar-track { background: var(--bg); }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .msg {
    max-width: 80%;
    padding: 10px 15px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.user {
    background: var(--accent);
    color: #1a0f00;
    align-self: flex-end;
    border-bottom-left-radius: 4px;
    font-weight: 500;
  }
  .msg.bot {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    align-self: flex-start;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bot-name {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .typing {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    align-self: flex-start;
    border-radius: 12px;
    border-bottom-right-radius: 4px;
    padding: 10px 15px;
    font-size: 13px;
    display: none;
  }
  .typing.show { display: block; }
  .typing span {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--text2);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    margin: 0 2px;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  #input-area {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    outline: none;
    font-family: inherit;
    transition: border .2s;
    direction: rtl;
  }
  #user-input:focus { border-color: var(--accent); }
  #send-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #1a0f00;
    font-size: 14px;
    font-weight: bold;
    padding: 10px 18px;
    cursor: pointer;
    height: 42px;
    white-space: nowrap;
    transition: background .2s, transform .1s;
  }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:active { transform: scale(.97); }
  .quick-btns {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 20px 0;
    flex-shrink: 0;
  }
  .qbtn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 12px;
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .qbtn:hover { border-color: var(--accent); color: var(--accent); }
  #welcome {
    text-align: center;
    padding: 30px 20px;
    color: var(--text2);
  }
  #welcome .big-logo {
    font-size: 60px;
    margin-bottom: 10px;
  }
  #welcome h2 { color: var(--accent2); font-size: 22px; margin-bottom: 8px; }
  #welcome p { font-size: 14px; line-height: 1.8; max-width: 400px; margin: 0 auto; }

#art-btn{

width:42px;
height:42px;

border:none;
border-radius:50%;

cursor:pointer;

font-size:18px;

background:#c9a227;

margin-left:5px;

}

#art-panel{

display:none;

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:92%;
max-width:1000px;

height:80vh;

background:#161b22;

border-radius:12px;

padding:10px;

z-index:99999;

border:1px solid #30363d;

}

#art-top{

display:flex;

gap:10px;

margin-bottom:10px;

}

#art-prompt{

flex:1;

padding:10px;

font-size:16px;

}

#art-canvas{

width:100%;

height:calc(100% - 60px);

background:white;

border-radius:8px;

}
</style>
</head>

<div id="header">
  <div class="logo">ط</div>
  <div>
    <h1>🦅 ذكاء طلائع العروبة</h1>
    <p>الذكاء الاصطناعي الخاص بمجموعة طلائع العروبة</p>
  </div>
  <div class="status">متصل</div>
</div>

<div class="quick-btns" id="quick-btns">

  <button class="qbtn" onclick="quickAsk('اعرفني بأعضاء طلائع العروبة')">👥 الأعضاء</button>

  <button class="qbtn" onclick="quickAsk('من هو علي الزبيدي؟')">🐒 علي الزبيدي</button>
  <button class="qbtn" onclick="quickAsk('من هو نواف؟')">💻 نواف المطور</button>
  <button class="qbtn" onclick="quickAsk('من هو الغامدي؟')">😂 الغامدي</button>
</div>

<div id="chat-container">
  <div id="welcome">
    <div class="big-logo">🦅</div>
    <h2>أهلاً بك في ذكاء طلائع العروبة!</h2>
    <p>أنا الذكاء الاصطناعي الخاص بمجموعتكم، أعرف كل شيء عن أعضاء طلائع العروبة وأسئلة كثيرة. اسألني عن أي شيء!</p>
  </div>
  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>
</div>

<div id="input-area">

<button id="art-btn">🎨</button>

</div>

function normalize(text) {
  return text.toLowerCase()
    .replace(/[أإآا]/g, 'ا')
    .replace(/[ىي]/g, 'ي')
    .replace(/ة/g, 'ه')
    .replace(/[^\u0600-\u06FFa-z0-9 ]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}

function findAnswer(input) {
  const norm = normalize(input);
  const words = norm.split(' ').filter(w => w.length > 1);
  
  let bestScore = 0;
  let bestAnswer = null;

  for (const item of KB) {
    for (const q of item.q) {
      const normQ = normalize(q);
      // Direct match
      if (norm.includes(normQ) || normQ.includes(norm)) {
        return item.a;
      }
      // Word overlap score
      const qWords = normQ.split(' ').filter(w => w.length > 1);
      let score = 0;
      for (const w of words) {
        if (qWords.some(qw => qw.includes(w) || w.includes(qw))) {
          score += w.length > 3 ? 2 : 1;
        }
      }
      if (score > bestScore) {
        bestScore = score;
        bestAnswer = item.a;
      }
    }
  }

  if (bestScore >= 3) return bestAnswer;

  // Check member names directly
  for (const [key, member] of Object.entries(MEMBERS)) {
    const nameParts = normalize(member.full).split(' ');
    if (nameParts.some(part => part.length > 2 && norm.includes(part))) {
      return `📋 معلومات عن ${member.full}:\n\n🏷️ الاسم: ${member.full}\n🔖 الانتماء: ${member.tribe}\n💼 الدور: ${member.role}${member.nick ? '\n🎭 اللقب: ' + member.nick : ''}\n📝 الوصف: ${member.desc}`;
    }
  }

  // Fallback smart response
  return generateFallback(input);
}

function generateFallback(input) {
  const norm = normalize(input);
  const greetings = ['هلا','اهلا','مرحبا','السلام','حياك'];
  if (greetings.some(g => norm.includes(g))) return "🦅 وأهلاً وسهلاً! أنا هنا لأخدمك. اسألني عن أي شيء يخص طلائع العروبة أو أي سؤال آخر!";
  
  if (norm.includes('من') || norm.includes('عرف') || norm.includes('معلومات')) {
    return "🔍 لم أجد معلومات محددة عن هذا. هل تقصد أحد أعضاء طلائع العروبة؟ يمكنك أن تسألني عن: ريجي، نواف، علي الزبيدي، الغامدي، نايف، أو أي عضو آخر في المجموعة!";
  }
  
  if (norm.includes('ما') || norm.includes('كيف') || norm.includes('لماذا') || norm.includes('متى') || norm.includes('أين')) {
    return "🤔 سؤال مثير للاهتمام! أبحث في ذاكرتي... أنا متخصص بشكل رئيسي في معلومات مجموعة طلائع العروبة وأعضائها. للأسئلة العامة الأخرى، يمكنني الإجابة عن كثير منها. حاول أن تعيد صياغة السؤال أو اسألني عن المجموعة وأعضائها!";
  }

  return "🦅 لم أفهم سؤالك تماماً أو ليس في قاموسي إجابة مباشرة له. لكن أنا متخصص في:\n\n👥 معلومات أعضاء طلائع العروبة\n📖 معاني المصطلحات القبلية\n🌍 معلومات ثقافية وعامة\n\nحاول أن تسأل بشكل أوضح أو اضغط على الأزرار السريعة!";
}

    name.textContent = '🦅 ذكاء طلائع العروبة';
    div.appendChild(name);
    const content = document.createElement('div');
    content.textContent = text;
    div.appendChild(content);
  } else {
    div.textContent = text;
  }
  chatContainer.insertBefore(div, typingDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function sendMsg() {
  const text = userInput.value.trim();
  if (!text) return;
  
  if (welcomeDiv) welcomeDiv.style.display = 'none';
  
  addMsg(text, 'user');
  userInput.value = '';
  userInput.style.height = 'auto';
  
  typingDiv.classList.add('show');
  chatContainer.scrollTop = chatContainer.scrollHeight;
  
  setTimeout(() => {
    typingDiv.classList.remove('show');
    const answer = findAnswer(text);
    addMsg(answer, 'bot');
  }, 600 + Math.random() * 600);
}

function quickAsk(text) {
  userInput.value = text;
  sendMsg();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function drawQatDetailed(ctx){
  const colors=["#2d6a2d","#1a5c1a","#3d8b3d","#4caf4c","#5cb85c"];
  // جذع
  ctx.fillStyle="#5d3a1a";
  ctx.fillRect(430,400,20,150);
  // فروع وأوراق
  for(let b=0;b<8;b++){
    const angle=-Math.PI/2+rand(-0.6,0.6);
    const len=rand(80,160);
    const bx=440+Math.cos(angle)*b*15;
    const by=400-b*30;
    ctx.beginPath();
    ctx.strokeStyle="#5d3a1a";
    ctx.lineWidth=rand(2,5);
    ctx.moveTo(bx,by);
    const ex=bx+Math.cos(angle)*len;
    const ey=by+Math.sin(angle)*len;
    ctx.lineTo(ex,ey);
    ctx.stroke();
    // أوراق على الفرع
    for(let l=0;l<rand(4,8);l++){
      const t=l/8;
      const lx=bx+(ex-bx)*t;
      const ly=by+(ey-by)*t;
      ctx.beginPath();
      ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];
      ctx.ellipse(lx+rand(-10,10),ly+rand(-10,10),rand(10,22),rand(6,13),rand(0,Math.PI),0,Math.PI*2);
      ctx.fill();
    }
  }
  // عنقود أوراق في القمة
  for(let i=0;i<30;i++){
    ctx.beginPath();
    ctx.fillStyle=colors[Math.floor(Math.random()*colors.length)];
    ctx.ellipse(rand(300,580),rand(100,380),rand(12,28),rand(7,16),rand(0,Math.PI),0,Math.PI*2);
    ctx.fill();
  }
  // نص
  ctx.fillStyle="#1a3a1a";
  ctx.font="bold 22px Arial";
  ctx.fillText("🌿 شجرة القات",300,560);
}

function drawTent(ctx){
  const c=rand(0,360);
  ctx.fillStyle=`hsl(${c},60%,55%)`;
  ctx.beginPath();
  ctx.moveTo(150,480);
  ctx.lineTo(450,120);
  ctx.lineTo(750,480);
  ctx.fill();
  ctx.fillStyle=`hsl(${c+30},60%,45%)`;
  ctx.beginPath();
  ctx.moveTo(350,480);
  ctx.lineTo(450,200);
  ctx.lineTo(550,480);
  ctx.fill();
  ctx.fillStyle="#3a2000";
  ctx.fillRect(390,350,60,130);
  // خطوط زخرفية
  ctx.strokeStyle="rgba(255,255,255,0.3)";
  ctx.lineWidth=3;
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.moveTo(180+i*50,480);
    ctx.lineTo(390+i*10,160+i*20);
    ctx.stroke();
  }
}

function drawDesert(ctx){
  // سماء
  const sky=ctx.createLinearGradient(0,0,0,300);
  sky.addColorStop(0,"#87CEEB");
  sky.addColorStop(1,"#FDB97D");
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,900,320);
  // رمال
  const sand=ctx.createLinearGradient(0,300,0,550);
  sand.addColorStop(0,"#F4D03F");
  sand.addColorStop(1,"#E67E22");
  ctx.fillStyle=sand;
  ctx.fillRect(0,300,900,250);
  // كثبان رملية
  for(let d=0;d<4;d++){
    ctx.beginPath();
    ctx.fillStyle=`rgba(230,${160+d*10},50,0.5)`;
    ctx.ellipse(rand(100,800),rand(350,480),rand(100,250),rand(30,80),0,0,Math.PI*2);
    ctx.fill();
  }
  // شمس
  ctx.beginPath();
  ctx.fillStyle="gold";
  ctx.arc(750,80,50,0,Math.PI*2);
  ctx.fill();
  // نخلة صغيرة
  ctx.fillStyle="#5d3a1a";
  ctx.fillRect(200,180,15,150);
  for(let p=0;p<6;p++){
    const a=rand(-Math.PI/2-0.5,-Math.PI/2+1.5);
    ctx.beginPath();
    ctx.fillStyle="#2d6a2d";
    ctx.save();
    ctx.translate(207,185);
    ctx.rotate(a);
    ctx.ellipse(40,0,50,12,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawLighthouse(ctx){
  // خلفية بحر
  ctx.fillStyle="#1a6b9a";
  ctx.fillRect(0,350,900,200);
  ctx.fillStyle="#87CEEB";
  ctx.fillRect(0,0,900,350);
  // برج
  ctx.fillStyle="#ddd";
  ctx.beginPath();
  ctx.moveTo(380,480);
  ctx.lineTo(400,120);
  ctx.lineTo(520,120);
  ctx.lineTo(540,480);
  ctx.fill();
  // خطوط حمراء
  ctx.fillStyle="#c0392b";
  for(let s=0;s<4;s++){
    const y=160+s*70;
    const w=140-s*8;
    ctx.fillRect(460-w/2,y,w,25);
  }
  // رأس المنارة
  ctx.fillStyle="#c0392b";

function drawSpider(ctx){
  const cx=450,cy=280;
  ctx.fillStyle="#1a1a1a";
  ctx.beginPath();
  ctx.arc(cx,cy,55,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx,cy-75,40,0,Math.PI*2);
  ctx.fill();
  // أرجل
  ctx.strokeStyle="#1a1a1a";
  ctx.lineWidth=5;
  const legs=[[-1.2,-0.4],[-0.9,0.3],[-0.6,0.9],[-0.3,1.5],[0.3,1.5],[0.6,0.9],[0.9,0.3],[1.2,-0.4]];
  legs.forEach(([a1,a2])=>{
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    const mx=cx+Math.cos(a1)*90;
    const my=cy+Math.sin(a1)*60;
    ctx.lineTo(mx,my);
    ctx.lineTo(mx+Math.cos(a2)*80,my+Math.sin(a2)*80);
    ctx.stroke();
  });
  // عيون
  ctx.fillStyle="#c0392b";
  for(let e=0;e<6;e++){
    ctx.beginPath();
    ctx.arc(cx-25+e*10,cy-78,5,0,Math.PI*2);
    ctx.fill();
  }
  // شبكة
  ctx.strokeStyle="rgba(200,200,200,0.2)";
  ctx.lineWidth=1;
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*300,cy+Math.sin(a)*300);
    ctx.stroke();
  }
  for(let r=80;r<320;r+=70){
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.stroke();
  }
}

function drawOctopus(ctx){
  const cx=450,cy=230;
  ctx.fillStyle=`hsl(${rand(280,320)},70%,50%)`;
  ctx.beginPath();
  ctx.ellipse(cx,cy,110,90,0,0,Math.PI*2);
  ctx.fill();
  // أذرع
  for(let i=0;i<8;i++){
    const a=i*(Math.PI/4)+Math.PI/8;
    ctx.beginPath();
    ctx.lineWidth=rand(12,20);
    ctx.strokeStyle=`hsl(${rand(280,320)},70%,50%)`;
    ctx.moveTo(cx+Math.cos(a)*80,cy+Math.sin(a)*70);
    const cp1x=cx+Math.cos(a+0.3)*180+rand(-30,30);
    const cp1y=cy+Math.sin(a+0.3)*180+rand(-30,30);
    const ep=cx+Math.cos(a+0.5)*280;
    const ey=cy+Math.sin(a+0.5)*220+rand(-50,50);
    ctx.quadraticCurveTo(cp1x,cp1y,ep,ey);
    ctx.stroke();
    // ممصات
    ctx.fillStyle="rgba(255,200,200,0.6)";
    for(let s=0;s<5;s++){
      const t=s/5;
      ctx.beginPath();
      ctx.arc(
        cx+Math.cos(a)*80+(cp1x-cx-Math.cos(a)*80)*t,
        cy+Math.sin(a)*70+(cp1y-cy-Math.sin(a)*70)*t,
        rand(4,8),0,Math.PI*2
      );
      ctx.fill();
    }
  }
  // عيون
  ctx.fillStyle="white";
  ctx.beginPath();ctx.arc(cx-35,cy-20,22,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+35,cy-20,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#1a1a1a";
  ctx.beginPath();ctx.arc(cx-35,cy-18,12,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+35,cy-18,12,0,Math.PI*2);ctx.fill();
}

function drawNetwork(ctx){
  ctx.fillStyle="#0a0a1a";ctx.fillRect(0,0,900,550);
  const nodes=[];
  for(let n=0;n<14;n++){
    nodes.push({x:rand(80,820),y:rand(60,490),r:rand(15,30),c:`hsl(${rand(180,260)},80%,60%)`});
  }
  // خطوط الاتصال
  ctx.lineWidth=1.5;
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
      if(d<300){
        ctx.strokeStyle=`rgba(100,180,255,${0.6-d/500})`;
        ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();
      }
    }
  }
  // عقد
  nodes.forEach(n=>{
    ctx.fillStyle=n.c;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="rgba(255,255,255,0.3)";
    ctx.beginPath();ctx.arc(n.x-n.r/3,n.y-n.r/3,n.r/3,0,Math.PI*2);ctx.fill();
  });
}

  }
  // أعمدة الجسر
  ctx.fillStyle="#888";
  [200,450,700].forEach(px=>{
    ctx.fillRect(px-15,200,30,200);
    ctx.fillRect(px-35,195,70,20);
  });

  ctx.strokeStyle="#666";ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(80,230);ctx.quadraticCurveTo(200,160,320,230);ctx.stroke();

  ctx.lineWidth=2;ctx.strokeStyle="#888";
  for(let r=0;r<30;r++){
    const rx=80+r*25;
    const ry=220+Math.sin((rx-80)/740*Math.PI)*30;
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx,260);ctx.stroke();

  ctx.fillStyle="#999";ctx.fillRect(80,255,740,20);

  ctx.setLineDash([20,10]);ctx.strokeStyle="yellow";ctx.lineWidth=2;

}

function drawWaterfalls(ctx){

  ctx.fillStyle=`hsl(210,60%,35%)`;ctx.beginPath();ctx.ellipse(450,400,55,80,0,0,Math.PI*2);ctx.fill();

function drawHourglass(ctx){

  ctx.beginPath();ctx.moveTo(365,450);ctx.lineTo(535,450);ctx.lineTo(455,275);ctx.lineTo(365,450);ctx.fill();
  // رمل عليوي
  const sandLeft=rand(0.2,0.8);

  ctx.fillStyle="#e6c06e";
  ctx.beginPath();
  ctx.moveTo(365+((sandY-100)/(175)*85),sandY);
  ctx.lineTo(535-((sandY-100)/(175)*85),sandY);
  ctx.lineTo(455,270);
  ctx.fill();
  // رمل سفلي
  const sandHeight=175*(1-sandLeft);
  ctx.beginPath();
  ctx.moveTo(365+(sandHeight/175*85),450-sandHeight);
  ctx.lineTo(535-(sandHeight/175*85),450-sandHeight);
  ctx.lineTo(535,450);ctx.lineTo(365,450);ctx.fill();

  for(let g=0;g<rand(5,12);g++){

}

function drawFire(ctx){
  ctx.fillStyle="#0a0a1a";ctx.fillRect(0,0,900,550);
  // حطب
  ctx.fillStyle="#5d3a1a";
  ctx.beginPath();ctx.moveTo(300,480);ctx.lineTo(600,480);ctx.lineTo(580,500);ctx.lineTo(320,500);ctx.fill();
  ctx.beginPath();ctx.moveTo(350,480);ctx.lineTo(370,460);ctx.lineTo(550,460);ctx.lineTo(570,480);ctx.fill();
  // طبقات النار
  const fireColors=[["#ff0000","#ff4400"],["#ff6600","#ff8800"],["#ffaa00","#ffcc00"],["rgba(255,230,100,0.5)","rgba(255,250,200,0.3)"]];
  fireColors.forEach(([c1,c2],i)=>{
    const h=280-i*50;
    const w=200-i*30;
    const y=480-i*70;
    ctx.fillStyle=c1;
    ctx.beginPath();
    ctx.moveTo(450,y-h);
    ctx.bezierCurveTo(450-w*0.4,y-h*0.7,450-w*0.6,y-h*0.3,450-w*0.5,y);
    ctx.bezierCurveTo(450-w*0.2,y+10,450+w*0.2,y+10,450+w*0.5,y);
    ctx.bezierCurveTo(450+w*0.6,y-h*0.3,450+w*0.4,y-h*0.7,450,y-h);
    ctx.fill();
    // شعلة ثانوية
    const sx=rand(-60,60);
    ctx.fillStyle=c2;
    ctx.beginPath();
    ctx.moveTo(450+sx,y-h*0.7);
    ctx.bezierCurveTo(450+sx-40,y-h*0.4,450+sx-50,y-h*0.1,450+sx,y);
    ctx.bezierCurveTo(450+sx+50,y-h*0.1,450+sx+40,y-h*0.4,450+sx,y-h*0.7);
    ctx.fill();
  });
  // جمر
  for(let e=0;e<15;e++){
    ctx.fillStyle=`hsl(${rand(0,40)},100%,${rand(50,80)}%)`;
    ctx.beginPath();ctx.arc(rand(350,550),rand(460,490),rand(2,7),0,Math.PI*2);ctx.fill();
  }
  // ضوء على الأرض
  ctx.fillStyle="rgba(255,100,0,0.1)";ctx.beginPath();ctx.ellipse(450,540,280,30,0,0,Math.PI*2);ctx.fill();
}

function drawWave(ctx){
  ctx.fillStyle="#0a2a4a";ctx.fillRect(0,0,900,550);
  // موجات متعددة
  const waveColors=["rgba(30,100,180,0.8)","rgba(50,130,200,0.7)","rgba(80,160,220,0.6)","rgba(120,190,240,0.5)"];
  waveColors.forEach((wc,wi)=>{
    ctx.fillStyle=wc;
    ctx.beginPath();
    ctx.moveTo(0,300+wi*30);
    for(let x=0;x<900;x+=5){
      const y=300+wi*30+Math.sin((x+wi*50)/80+wi)*rand(30,70);
      ctx.lineTo(x,y);
    }
    ctx.lineTo(900,550);ctx.lineTo(0,550);ctx.fill();
  });
  // رغوة
  for(let f=0;f<20;f++){
    ctx.fillStyle="rgba(255,255,255,0.3)";
    ctx.beginPath();ctx.arc(rand(0,900),rand(280,450),rand(5,20),0,Math.PI*2);ctx.fill();
  }
  // شمس أو قمر
  if(Math.random()>0.5){
    ctx.fillStyle="#f0e68c";ctx.beginPath();ctx.arc(750,100,50,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillStyle="#e0e8ff";ctx.beginPath();ctx.arc(150,100,45,0,Math.PI*2);ctx.fill();

    ctx.fillStyle="rgba(224,232,255,0.3)";
    ctx.beginPath();ctx.moveTo(150,145);ctx.lineTo(100,400);ctx.lineTo(200,400);ctx.fill();
  }
}

function drawBlackHole(ctx){
  ctx.fillStyle="#000005";ctx.fillRect(0,0,900,550);

  for(let s=0;s<100;s++){
    const d=Math.hypot(rand(0,900)-450,rand(0,550)-275);
    if(d>200){
      ctx.fillStyle=`rgba(255,255,255,${rand(0.3,1)})`;
      ctx.fillRect(rand(0,900),rand(0,550),rand(1,3),rand(1,3));
    }
  }
  // قرص التراكم
  for(let r=240;r>60;r-=15){
    const alpha=(240-r)/200;
    ctx.strokeStyle=`hsla(${30+r/3},80%,${50+r/5}%,${alpha})`;
    ctx.lineWidth=12;
    ctx.beginPath();ctx.ellipse(450,275,r,r/3,0.2,0,Math.PI*2);ctx.stroke();

  // الثقب
  const hole=ctx.createRadialGradient(450,275,0,450,275,90);
  hole.addColorStop(0,"black");hole.addColorStop(0.7,"black");hole.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=hole;ctx.beginPath();ctx.arc(450,275,110,0,Math.PI*2);ctx.fill();
  // انحناء الضوء
  ctx.strokeStyle="rgba(255,200,100,0.2)";ctx.lineWidth=2;
  for(let l=0;l<8;l++){
    ctx.beginPath();

  }
}

  ctx.fillStyle="#1a1a1a";ctx.fillRect(170,165,560,300);
  // شاشة
  ctx.fillStyle="#0d1117";ctx.fillRect(175,168,550,290);
  // محتوى الشاشة
  ctx.fillStyle=`hsl(${rand(180,260)},70%,60%)`;ctx.font="bold 28px monospace";ctx.fillText("< Hello World />",230,300);
  ctx.fillStyle="#c9a227";ctx.font="16px monospace";
  for(let l=0;l<3;l++){ctx.fillText(`function code_${l}() {`,230,340+l*25);}
  // كاميرا
  ctx.fillStyle="#333";ctx.beginPath();ctx.arc(450,175,5,0,Math.PI*2);ctx.fill();
  // قاعدة
  ctx.fillStyle="#999";ctx.fillRect(100,500,700,20);
  ctx.fillStyle="#777";ctx.fillRect(100,500,700,8);
  // لوحة مفاتيح
  for(let r=0;r<4;r++){
    for(let c=0;c<14;c++){
      ctx.fillStyle="#2a2a2a";ctx.fillRect(175+c*38,475+r*0,35,0);
    }
  }
}

function drawPhone(ctx){
  ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,900,550);
  // هاتف
  ctx.fillStyle="#2a2a2a";
  ctx.beginPath();ctx.roundRect(310,80,280,440,20);ctx.fill();
  ctx.fillStyle="#1a1a1a";
  ctx.beginPath();ctx.roundRect(320,90,260,420,15);ctx.fill();
  // شاشة
  const grad=ctx.createLinearGradient(330,100,580,500);
  grad.addColorStop(0,`hsl(${rand(180,260)},60%,15%)`);
  grad.addColorStop(1,`hsl(${rand(180,260)},60%,8%)`);
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.roundRect(330,100,240,400,12);ctx.fill();
  // تطبيقات
  const appColors=["#c0392b","#27ae60","#2980b9","#f39c12","#8e44ad","#1abc9c","#e74c3c","#3498db"];
  for(let r=0;r<3;r++){
    for(let c=0;c<4;c++){
      ctx.fillStyle=appColors[(r*4+c)%appColors.length];
      ctx.beginPath();ctx.roundRect(348+c*55,145+r*85,45,45,10);ctx.fill();
    }
  }
  // ساعة
  ctx.fillStyle="white";ctx.font="bold 18px Arial";ctx.fillText("10:30",420,132);
  // شريط حالة
  ctx.fillStyle="rgba(255,255,255,0.5)";ctx.fillRect(335,415,230,20);
  // زر منزل
  ctx.strokeStyle="#555";ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(450,525,12,0,Math.PI*2);ctx.stroke();
}

function drawCamera(ctx){
  ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,900,550);
  // جسم الكاميرا
  ctx.fillStyle="#2a2a2a";
  ctx.beginPath();ctx.roundRect(200,200,500,250,15);ctx.fill();
  // مقبض علوي
  ctx.fillStyle="#333";ctx.fillRect(350,170,200,35);
  ctx.beginPath();ctx.roundRect(350,170,200,35,8);ctx.fill();
  // هيكل العدسة
  ctx.fillStyle="#1a1a1a";ctx.beginPath();ctx.arc(420,325,110,0,Math.PI*2);ctx.fill();
  // عدسة
  for(let l=0;l<5;l++){
    ctx.strokeStyle=`hsl(${220+l*10},50%,${40-l*5}%)`;ctx.lineWidth=8-l;
    ctx.beginPath();ctx.arc(420,325,95-l*15,0,Math.PI*2);ctx.stroke();
  }
  ctx.fillStyle="#0a0a1a";ctx.beginPath();ctx.arc(420,325,30,0,Math.PI*2);ctx.fill();
  // لمعة العدسة
  ctx.fillStyle="rgba(200,220,255,0.4)";ctx.beginPath();ctx.arc(405,308,15,0,Math.PI*2);ctx.fill();
  // أزرار
  ctx.fillStyle="#c9a227";ctx.beginPath();ctx.arc(610,245,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#888";ctx.fillRect(580,270,30,12);
  ctx.fillRect(620,270,25,12);
  // فلاش
  ctx.fillStyle="#e8e8e0";ctx.fillRect(630,200,60,35);
  ctx.fillStyle="rgba(255,255,200,0.8)";ctx.fillRect(633,203,54,29);
  // شاشة خلفية صغيرة
  ctx.fillStyle="#87CEEB";ctx.fillRect(620,310,75,55);
}

function drawTV(ctx){
  ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,900,550);
  // إطار
  ctx.fillStyle="#2a2a2a";
  ctx.beginPath();ctx.roundRect(100,80,700,440,10);ctx.fill();
  ctx.fillStyle="#1a1a1a";
  ctx.beginPath();ctx.roundRect(115,95,670,380,8);ctx.fill();
  // شاشة برامج
  const tvg=ctx.createLinearGradient(120,100,780,460);
  tvg.addColorStop(0,"#0a1a3a");tvg.addColorStop(1,"#1a0a2a");
  ctx.fillStyle=tvg;
  ctx.beginPath();ctx.roundRect(120,100,660,370,5);ctx.fill();
  // محتوى افتراضي
  ctx.fillStyle="#4a90d9";ctx.fillRect(120,100,660,50);
  ctx.fillStyle="white";ctx.font="20px Arial";ctx.fillText("📺 البث المباشر",350,132);
  // صورة وهمية
  ctx.fillStyle="rgba(255,255,255,0.05)";
  for(let r=0;r<8;r++){
    ctx.fillRect(120,150+r*26,660,18);
  }
  // أضواء LED
  ctx.fillStyle="#c0392b";ctx.beginPath();ctx.arc(760,488,6,0,Math.PI*2);ctx.fill();
  // قاعدة
  ctx.fillStyle="#333";
  ctx.beginPath();ctx.moveTo(380,490);ctx.lineTo(400,540);ctx.lineTo(500,540);ctx.lineTo(520,490);ctx.fill();
  ctx.fillStyle="#444";ctx.fillRect(360,535,180,15);
}

function drawSpace(ctx){
  ctx.fillStyle="#000005";ctx.fillRect(0,0,900,550);
  // نجوم
  for(let s=0;s<150;s++){
    const br=rand(0.3,1);
    ctx.fillStyle=`rgba(255,255,255,${br})`;
    ctx.beginPath();ctx.arc(rand(0,900),rand(0,550),rand(0.3,2.5),0,Math.PI*2);ctx.fill();
  }
  // مجرة درب اللبانة
  ctx.fillStyle="rgba(200,180,255,0.08)";
  ctx.beginPath();ctx.ellipse(450,275,400,80,0.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(220,200,255,0.06)";
  ctx.beginPath();ctx.ellipse(450,275,380,60,0.2,0,Math.PI*2);ctx.fill();
  // كواكب
  const planets=[{x:200,y:150,r:55,c:[200,120,60]},{x:680,y:320,r:80,c:[150,180,250]},{x:150,y:380,r:35,c:[180,80,80]},{x:750,y:120,r:45,c:[200,200,100]}];
  planets.forEach(p=>{
    const pg=ctx.createRadialGradient(p.x-p.r/3,p.y-p.r/3,0,p.x,p.y,p.r);
    pg.addColorStop(0,`rgb(${p.c[0]+50},${p.c[1]+50},${p.c[2]+50})`);
    pg.addColorStop(1,`rgb(${p.c[0]-30},${p.c[1]-30},${p.c[2]-30})`);
    ctx.fillStyle=pg;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    // حلقات
    if(p.r>70){
      ctx.strokeStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},0.5)`;ctx.lineWidth=10;
      ctx.beginPath();ctx.ellipse(p.x,p.y,p.r*1.8,p.r*0.4,0.3,0,Math.PI*2);ctx.stroke();
    }
  });
  // مذنب
  const cg=ctx.createLinearGradient(600,100,200,300);
  cg.addColorStop(0,"rgba(200,220,255,0.8)");cg.addColorStop(1,"rgba(200,220,255,0)");
  ctx.strokeStyle=cg;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(600,100);ctx.lineTo(200,300);ctx.stroke();
  ctx.fillStyle="white";ctx.beginPath();ctx.arc(600,100,8,0,Math.PI*2);ctx.fill();
  // مجرة بعيدة
  ctx.fillStyle="rgba(255,200,255,0.3)";ctx.beginPath();ctx.arc(850,60,12,0,Math.PI*2);ctx.fill();
}

function drawSunset(ctx){
  // تدرج السماء
  const sg=ctx.createLinearGradient(0,0,0,400);
  sg.addColorStop(0,"#1a1a5e");sg.addColorStop(0.3,"#8b0050");sg.addColorStop(0.6,"#ff4500");sg.addColorStop(0.8,"#ff8c00");sg.addColorStop(1,"#ffd700");
  ctx.fillStyle=sg;ctx.fillRect(0,0,900,400);
  // أرض
  const gg=ctx.createLinearGradient(0,380,0,550);
  gg.addColorStop(0,"#1a3a1a");gg.addColorStop(1,"#0a1a0a");
  ctx.fillStyle=gg;ctx.fillRect(0,380,900,170);
  // شمس
  const sunY=rand(300,380);
  const sunG=ctx.createRadialGradient(450,sunY,0,450,sunY,90);
  sunG.addColorStop(0,"#fff7c0");sunG.addColorStop(0.4,"#ffd700");sunG.addColorStop(1,"rgba(255,100,0,0)");
  ctx.fillStyle=sunG;ctx.beginPath();ctx.arc(450,sunY,90,0,Math.PI*2);ctx.fill();
  // انعكاس على الماء
  if(sunY>350){
    ctx.fillStyle="rgba(255,180,50,0.3)";
    ctx.beginPath();ctx.moveTo(350,380);ctx.lineTo(550,380);ctx.lineTo(600,550);ctx.lineTo(300,550);ctx.fill();
  }
  // سحب
  const cloudColors=["rgba(100,0,80,0.5)","rgba(180,50,0,0.4)","rgba(255,100,0,0.3)"];
  for(let c=0;c<6;c++){
    ctx.fillStyle=cloudColors[c%3];
    const cx=rand(80,820),cy=rand(50,200);
    ctx.beginPath();ctx.arc(cx,cy,rand(30,70),0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+50,cy+8,rand(25,55),0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-35,cy+5,rand(20,45),0,Math.PI*2);ctx.fill();
  }
  // طيور
  for(let b=0;b<8;b++){
    ctx.strokeStyle="rgba(0,0,0,0.6)";ctx.lineWidth=2;
    const bx=rand(200,700),by=rand(150,300);
    ctx.beginPath();ctx.moveTo(bx,by);ctx.quadraticCurveTo(bx+12,by-8,bx+24,by);ctx.stroke();
  }
}

function drawRain(ctx){
  ctx.fillStyle="#2a3a4a";ctx.fillRect(0,0,900,550);
  // سحب
  for(let c=0;c<6;c++){
    ctx.fillStyle=`hsl(220,${rand(20,35)}%,${rand(25,40)}%)`;
    const cx=rand(80,820),cy=rand(30,150);
    ctx.beginPath();ctx.arc(cx,cy,rand(50,100),0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+70,cy+10,rand(40,80),0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-50,cy+5,rand(35,70),0,Math.PI*2);ctx.fill();
  }
  // مطر
  for(let r=0;r<80;r++){
    ctx.strokeStyle=`rgba(150,200,255,${rand(0.3,0.7)})`;ctx.lineWidth=rand(1,2);
    const rx=rand(0,900),ry=rand(0,500);
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-5,ry+rand(15,30));ctx.stroke();
  }
  // أرضية وبرك
  ctx.fillStyle="#3a4a3a";ctx.fillRect(0,470,900,80);
  for(let p=0;p<5;p++){
    ctx.strokeStyle="rgba(150,200,255,0.4)";ctx.lineWidth=1;
    const px=rand(100,800);
    ctx.beginPath();ctx.arc(px,490,rand(10,30),0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(px,490,rand(5,15),0,Math.PI*2);ctx.stroke();
  }
  // أضواء خافتة
  for(let l=0;l<4;l++){
    ctx.fillStyle=`rgba(255,220,100,0.15)`;
    ctx.beginPath();ctx.arc(rand(100,800),rand(300,470),rand(20,50),0,Math.PI*2);ctx.fill();
  }
}

function drawFog(ctx){
  ctx.fillStyle="#8a9aaa";ctx.fillRect(0,0,900,550);
  // طبقات ضباب
  for(let l=0;l<8;l++){
    ctx.fillStyle=`rgba(200,210,220,${rand(0.1,0.25)})`;
    ctx.beginPath();ctx.ellipse(rand(-50,950),rand(50,500),rand(200,450),rand(50,150),0,0,Math.PI*2);ctx.fill();
  }
  // أشياء تظهر جزئياً
  ctx.fillStyle="rgba(80,80,80,0.3)";
  ctx.fillRect(150,250,60,200);ctx.fillRect(600,220,50,230);
  // فانوس
  ctx.fillStyle="rgba(255,200,50,0.15)";
  ctx.beginPath();ctx.arc(450,300,120,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(255,200,50,0.3)";
  ctx.beginPath();ctx.arc(450,300,40,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#c9a227";ctx.fillRect(448,200,4,100);
}

function drawExplosion(ctx){
  ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,900,550);
  // توهج خلفي
  const blastG=ctx.createRadialGradient(450,275,0,450,275,300);
  blastG.addColorStop(0,"rgba(255,200,100,0.3)");blastG.addColorStop(1,"rgba(255,50,0,0)");
  ctx.fillStyle=blastG;ctx.beginPath();ctx.arc(450,275,300,0,Math.PI*2);ctx.fill();
  // انفجار
  for(let l=0;l<5;l++){
    const size=250-l*30;
    const eg=ctx.createRadialGradient(450,275,0,450+rand(-20,20),275+rand(-20,20),size);
    eg.addColorStop(0,"rgba(255,255,200,0.9)");
    eg.addColorStop(0.3,"rgba(255,180,0,0.7)");
    eg.addColorStop(0.6,"rgba(255,60,0,0.5)");
    eg.addColorStop(1,"rgba(100,0,0,0)");
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(450+rand(-10,10),275+rand(-10,10),size,0,Math.PI*2);ctx.fill();
  }
  // شرارات
  for(let s=0;s<30;s++){
    const a=rand(0,Math.PI*2);
    const len=rand(100,350);
    const sc=ctx.createLinearGradient(450,275,450+Math.cos(a)*len,275+Math.sin(a)*len);
    sc.addColorStop(0,"rgba(255,200,50,0.9)");sc.addColorStop(1,"rgba(255,50,0,0)");
    ctx.strokeStyle=sc;ctx.lineWidth=rand(1,5);
    ctx.beginPath();ctx.moveTo(450,275);ctx.lineTo(450+Math.cos(a)*len,275+Math.sin(a)*len);ctx.stroke();
  }
  // دخان
  for(let sm=0;sm<12;sm++){
    ctx.fillStyle=`rgba(80,80,80,${rand(0.1,0.3)})`;
    ctx.beginPath();ctx.arc(450+rand(-150,150),275+rand(-180,-50),rand(30,80),0,Math.PI*2);ctx.fill();
  }
}

{

ctx.fillStyle="black";

ctx.font="30px Arial";

ctx.fillText(
"لا يوجد مولد لهذا الرسم بعد",
120,
250
);

ctx.fillText(
text,
120,
320
);
